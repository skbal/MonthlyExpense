version: '3.8'

services:
  app:
    build: .
    container_name: monthlyexp-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - monthlyexp-network
    volumes:
      - ./logs:/app/logs

  nginx:
    image: nginx:latest
    container_name: monthlyexp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - monthlyexp-network

networks:
  monthlyexp-network:
    driver: bridge

volumes:
  logs:
